name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string
      draft:
        description: "Create the release as a draft"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark the release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run build:win

      - name: List release files
        shell: pwsh
        run: Get-ChildItem -Path release -File | Format-Table Name, Length

      - name: Verify updater metadata
        shell: pwsh
        run: |
          $latestPath = Join-Path "release" "latest.yml"
          $latestContent = Get-Content -LiteralPath $latestPath -Raw
          $pathMatch = [regex]::Match($latestContent, "(?m)^path:\s*(.+?)\s*$")
          if (-not $pathMatch.Success) {
            throw "latest.yml does not contain a path entry."
          }
          $installerName = $pathMatch.Groups[1].Value.Trim()
          $installerName = $installerName -replace '^[''\"]|[''\"]$', ''
          if ($installerName -match "\s") {
            throw "Installer asset names must not contain whitespace because GitHub rewrites those names: $installerName"
          }
          if ($installerName -notmatch "^Daedalus-Studio-Setup-\d+\.\d+\.\d+\.exe$") {
            throw "Unexpected installer asset name in latest.yml: $installerName"
          }
          $installerPath = Join-Path "release" $installerName
          if (-not (Test-Path -LiteralPath $installerPath -PathType Leaf)) {
            throw "latest.yml points to a missing installer: $installerName"
          }
          $blockmapPath = "$installerPath.blockmap"
          if (-not (Test-Path -LiteralPath $blockmapPath -PathType Leaf)) {
            throw "Missing installer blockmap: $installerName.blockmap"
          }
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: daedalus-studio-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: Daedalus Studio ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          overwrite_files: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
