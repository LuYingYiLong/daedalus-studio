appId: com.daedalus.studio
productName: Daedalus Studio

publish:
  provider: github
  owner: LuYingYiLong
  repo: daedalus-studio

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - package.json

extraResources:
  - from: build/icon.ico
    to: icon.ico

asar: true
asarUnpack:
  - node_modules/node-pty/**/*

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

mac:
  icon: build/icon.svg

nsis:
  artifactName: "Daedalus-Studio-Setup-${version}.${ext}"
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
